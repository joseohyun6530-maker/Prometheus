# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cozy-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run db:migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
